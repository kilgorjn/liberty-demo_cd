pipeline:
  name: Liberty Deploy Pipeline
  identifier: liberty_deploy_pipeline
  projectIdentifier: appliberty
  orgIdentifier: default
  tags: {}
  variables:
    - name: version
      type: String
      description: The version number (e.g. 0.0.1)
      required: true
      value: <+input>
  stages:
    - stage:
        name: Deploy Stage
        identifier: deploy_stage
        description: Deploy Liberty EAR
        type: Deployment
        spec:
          deploymentType: Ssh
          service:
            serviceRef: <+input>
          infrastructure:
            environmentRef: <+input>
            infrastructureDefinitionRef: <+input>
          execution:
            steps:
              - step:
                  name: Download and Deploy EAR
                  identifier: download_deploy_ear
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -e
                          TARGET_DIR="/opt/ibm/wlp/usr/servers/defaultServer/dropins"
                          FILENAME="liberty-demo-0.0.1-SNAPSHOT.ear"
                          URL="https://github.com/kilgorjn/liberty-demo/releases/download/<+pipeline.variables.version>/$FILENAME"
                          echo "Downloading version <+pipeline.variables.version>..."
                          curl -L -o "$TARGET_DIR/$FILENAME" "$URL"
                          echo "Deployment complete"
            rollbackSteps: []

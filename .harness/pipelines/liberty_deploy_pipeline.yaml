pipeline:
  name: Liberty Deploy Pipeline
  identifier: liberty_deploy_pipeline
  projectIdentifier: appliberty
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Deploy Stage
        identifier: deploy_stage
        type: Deployment
        spec:
          deploymentType: SSH
          service:
            serviceRef: <+input>
          infrastructure:
            environmentRef: <+input>
            infrastructureDefinitionRef: <+input>
          execution:
            steps:
              - step:
                  name: Download and Deploy EAR
                  identifier: download_deploy_ear
                  type: Command
                  spec:
                    onDelegate: false
                    commandUnits:
                      - identifier: fetch_and_copy
                        name: Fetch EAR from GitHub
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                TARGET_DIR="/opt/ibm/wlp/usr/servers/defaultServer/dropins"
                                FILENAME="liberty-demo-0.0.1-SNAPSHOT.ear"
                                URL="https://github.com<+pipeline.variables.version>/$FILENAME"
                                curl -L -o "$TARGET_DIR/$FILENAME" "$URL"
            rollbackSteps: [] # Mandatory for Deployment stages
  variables:
    - name: version
      type: String
      value: <+input>
